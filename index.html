<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Omni-CAD</title>
	<style>
		body, html {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
		}
		iframe {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border: none;
		}
		#start-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-color: #1e1e1e;
			color: #fff;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			font-size: 24px;
			cursor: pointer;
			z-index: 1000;
			transition: opacity 0.5s ease;
		}
	</style>
</head>
<body>
	<div id="start-overlay">Just click anywhere to start in full screen</div>
	<iframe src="https://script.google.com/macros/s/AKfycbxW6-nGbkJ4iEi_syTUN1sVz5W9xPoKHGVhClj0Lk5WOjk2pdfUjnQdhmb1Z-eM6IfY/exec" scrolling="no" allowfullscreen></iframe>
	
	<script>
		document.getElementById('start-overlay').addEventListener('click', function() {
			var docElm = document.documentElement;
			if (docElm.requestFullscreen) {
				docElm.requestFullscreen();
			} else if (docElm.mozRequestFullScreen) {
				docElm.mozRequestFullScreen();
			} else if (docElm.webkitRequestFullScreen) {
				docElm.webkitRequestFullScreen();
			} else if (docElm.msRequestFullscreen) {
				docElm.msRequestFullscreen();
			}
			
			// Fade out the overlay
			this.style.opacity = '0';
			setTimeout(() => {
				this.style.display = 'none';
			}, 500);
		});
	</script>
</body>
</html>
